name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: python:3.12

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moderation_db_user
          POSTGRES_PASSWORD: moderation_db_password
          POSTGRES_DB: moderation_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env file for tests
      run: |
        echo "POSTGRES_SERVER=db" >> .env
        echo "POSTGRES_PORT=5432" >> .env
        echo "POSTGRES_USER=moderation_db_user" >> .env
        echo "POSTGRES_PASSWORD=moderation_db_password" >> .env
        echo "POSTGRES_DB=moderation_db" >> .env
        echo "JWT_SECRET=test_secret_key" >> .env
        echo "JWT_ALGORITHM=HS256" >> .env
        echo "B2B_TO_MODERATION_KEY=secret-b2b-moderation-key" >> .env

    - name: Run migrations
      run: |
        alembic upgrade head

    - name: Run tests
      run: |
        pytest
